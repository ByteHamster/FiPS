name: Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        compiler: ["gcc", "clang"]
        version: [10, 11, 12, 13, 14, 15]
        exclude:
          - { compiler: gcc, version: 10}
          - { compiler: gcc, version: 14}
          - { compiler: gcc, version: 15}
    name: Build (${{ matrix.compiler }} ${{ matrix.version }})
    runs-on: ubuntu-24.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends ca-certificates cmake git libtbb-dev
      - name: Install GCC
        if: ${{ matrix.compiler }} == gcc
        run: |
          sudo apt-get install --assume-yes --no-install-recommends gcc-${{ matrix.version }} g++-${{ matrix.version }}
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-${{ matrix.version }} ${{ matrix.version }}
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-${{ matrix.version }} ${{ matrix.version }}
      - name: Install Clang
        if: ${{ matrix.compiler }} == clang
        run: |
          sudo apt-get install --assume-yes --no-install-recommends clang-${{ matrix.version }}
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-${{ matrix.version }} ${{ matrix.version }}
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-${{ matrix.version }} ${{ matrix.version }}
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -B ./build
          cmake --build ./build --parallel
